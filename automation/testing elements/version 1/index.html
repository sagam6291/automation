<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Controls</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #111;
      --subtle: #888;
      --line: #e0e0e0;
      --accent: #111;
      --on-accent: #fafafa;
      --radius: 3px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.5;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ─── PAGE 1 ─────────────────────────────── */
    #page1 {
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    .wordmark {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--subtle);
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    .group {
      border-top: 1px solid var(--line);
      padding: 24px 0;
    }
    .group:last-child { border-bottom: 1px solid var(--line); }

    .group-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--subtle);
      margin-bottom: 16px;
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: var(--fg);
      color: var(--on-accent);
      border: 1px solid var(--fg);
      border-radius: var(--radius);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .75; }
    .btn.ghost {
      background: transparent;
      color: var(--fg);
    }
    .btn.ghost:hover { background: var(--line); opacity: 1; }

    /* Links */
    .link-row { display: flex; flex-wrap: wrap; gap: 20px; }
    .link {
      font-size: 13px;
      color: var(--fg);
      text-underline-offset: 3px;
      transition: color .15s;
    }
    .link:hover { color: var(--subtle); }

    /* Toggle */
    .toggle-row { display: flex; align-items: center; gap: 12px; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { display: none; }
    .track {
      position: absolute; inset: 0;
      background: var(--line);
      border-radius: 20px;
      border: 1px solid #ccc;
      transition: background .2s, border-color .2s;
    }
    .thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      background: #999;
      border-radius: 50%;
      transition: transform .2s, background .2s;
      pointer-events: none;
    }
    .toggle input:checked + .track { background: var(--fg); border-color: var(--fg); }
    .toggle input:checked ~ .thumb { transform: translateX(16px); background: var(--bg); }
    .toggle-label { font-size: 13px; }

    /* Checkbox */
    .checks { display: flex; gap: 24px; flex-wrap: wrap; }
    .check-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; user-select: none; }
    .check-item input[type="checkbox"] { display: none; }
    .box {
      width: 16px; height: 16px;
      border: 1px solid #bbb;
      border-radius: 2px;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .check-item input:checked ~ .box { background: var(--fg); border-color: var(--fg); }
    .check-item input:checked ~ .box::after {
      content: '';
      width: 8px; height: 4px;
      border-left: 1.5px solid var(--bg);
      border-bottom: 1.5px solid var(--bg);
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    /* Radio */
    .radios { display: flex; gap: 24px; flex-wrap: wrap; }
    .radio-item { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; user-select: none; }
    .radio-item input[type="radio"] { display: none; }
    .dot {
      width: 16px; height: 16px;
      border: 1px solid #bbb;
      border-radius: 50%;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: border-color .15s;
    }
    .radio-item input:checked ~ .dot { border-color: var(--fg); }
    .radio-item input:checked ~ .dot::after {
      content: '';
      width: 7px; height: 7px;
      background: var(--fg);
      border-radius: 50%;
      display: block;
    }

    /* Text field */
    .fields { display: flex; flex-direction: column; gap: 10px; }
    .field {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--fg);
      outline: none;
      transition: border-color .15s;
    }
    .field:focus { border-color: var(--fg); }
    .field::placeholder { color: #bbb; }

    /* Menu */
    .menu-wrap { position: relative; display: inline-block; }
    .menu-trigger {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      color: var(--fg);
      transition: border-color .15s;
    }
    .menu-trigger:hover { border-color: #aaa; }
    .menu-trigger .caret { font-size: 9px; color: var(--subtle); transition: transform .2s; }
    .menu-trigger.open .caret { transform: rotate(180deg); }
    .menu-list {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 160px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
      z-index: 10;
      overflow: hidden;
    }
    .menu-list.open { display: block; }
    .menu-item {
      display: block;
      padding: 9px 14px;
      font-size: 13px;
      color: var(--fg);
      text-decoration: none;
      transition: background .1s;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: 'IBM Plex Sans', sans-serif;
    }
    .menu-item:hover { background: var(--line); }

    /* Icons */
    .icon-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .icon-btn {
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      color: var(--fg);
      transition: border-color .15s, background .15s;
      background: var(--bg);
    }
    .icon-btn:hover { border-color: var(--fg); background: var(--fg); }

    /* Image cards */
    .img-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .img-card {
      display: block;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s;
      position: relative;
    }
    .img-card:hover { border-color: var(--fg); }
    .img-card-inner {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      background: #f2f2f2;
      transition: background .15s;
    }
    .img-card:hover .img-card-inner { background: #e8e8e8; }

    /* ─── PAGE 2 ─────────────────────────────── */
    #page2 {
      display: none;
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }
    #page2.active { display: block; }

    .p2-mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--subtle);
      text-transform: uppercase;
      margin-bottom: 56px;
    }

    .p2-heading {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--fg);
    }

    .p2-sub {
      font-size: 13px;
      color: var(--subtle);
      margin-bottom: 48px;
      max-width: 360px;
      line-height: 1.7;
    }

    .back-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--fg);
      text-decoration: none;
      letter-spacing: 0.04em;
      border-bottom: 1px solid var(--line);
      padding-bottom: 2px;
      transition: border-color .15s;
      cursor: pointer;
      background: none;
      border-left: none;
      border-right: none;
      border-top: none;
    }
    .back-link:hover { border-bottom-color: var(--fg); }
  </style>
</head>
<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="wordmark">Controls — Page 1</div>

  <div class="group">
    <div class="group-label">Button</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn" onclick="goTo2()">Go to page 2</button>
      <button class="btn ghost" onclick="goTo2()">Ghost button</button>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Links</div>
    <div class="link-row">
      <a class="link" href="#" onclick="goTo2();return false;">Page two</a>
      <a class="link" href="#" onclick="goTo2();return false;">Dashboard</a>
      <a class="link" href="#" onclick="goTo2();return false;">Reports</a>
      <a class="link" href="#" onclick="goTo2();return false;">View all →</a>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Toggle</div>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" checked/>
          <span class="track"></span>
          <span class="thumb"></span>
        </label>
        <span class="toggle-label">Notifications</span>
      </div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox"/>
          <span class="track"></span>
          <span class="thumb"></span>
        </label>
        <span class="toggle-label">Dark mode</span>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Checkboxes</div>
    <div class="checks">
      <label class="check-item">
        <input type="checkbox" checked/>
        <span class="box"></span>
        Option A
      </label>
      <label class="check-item">
        <input type="checkbox"/>
        <span class="box"></span>
        Option B
      </label>
      <label class="check-item">
        <input type="checkbox"/>
        <span class="box"></span>
        Option C
      </label>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Radio</div>
    <div class="radios">
      <label class="radio-item">
        <input type="radio" name="size" checked/>
        <span class="dot"></span>
        Small
      </label>
      <label class="radio-item">
        <input type="radio" name="size"/>
        <span class="dot"></span>
        Medium
      </label>
      <label class="radio-item">
        <input type="radio" name="size"/>
        <span class="dot"></span>
        Large
      </label>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Text fields</div>
    <div class="fields">
      <input class="field" type="text" placeholder="Name"/>
      <input class="field" type="email" placeholder="Email"/>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Menu</div>
    <div class="menu-wrap">
      <button class="menu-trigger" id="menuTrigger" onclick="toggleMenu()">
        Options <span class="caret">▼</span>
      </button>
      <div class="menu-list" id="menuList">
        <a class="menu-item" href="#" onclick="goTo2();return false;">Go to page 2</a>
        <button class="menu-item">Settings</button>
        <button class="menu-item">Profile</button>
        <button class="menu-item">Sign out</button>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Icons</div>
    <div class="icon-row">
      <a class="icon-btn" href="#" onclick="goTo2();return false;" title="Home">⌂</a>
      <a class="icon-btn" href="#" onclick="goTo2();return false;" title="Search">⌕</a>
      <a class="icon-btn" href="#" onclick="goTo2();return false;" title="Settings">⚙</a>
      <a class="icon-btn" href="#" onclick="goTo2();return false;" title="Share">↗</a>
      <a class="icon-btn" href="#" onclick="goTo2();return false;" title="Download">↓</a>
    </div>
  </div>

  <div class="group">
    <div class="group-label">Images</div>
    <div class="img-grid">
      <a class="img-card" href="#" onclick="goTo2();return false;">
        <div class="img-card-inner">🌿</div>
      </a>
      <a class="img-card" href="#" onclick="goTo2();return false;">
        <div class="img-card-inner">🌊</div>
      </a>
      <a class="img-card" href="#" onclick="goTo2();return false;">
        <div class="img-card-inner">🏔</div>
      </a>
      <a class="img-card" href="#" onclick="goTo2();return false;">
        <div class="img-card-inner">🌌</div>
      </a>
    </div>
  </div>
</div>


<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="p2-mono">Controls — Page 2</div>
  <div class="p2-heading">You're on<br/>page two.</div>
  <p class="p2-sub">You got here by clicking a button, link, icon, image, or menu item on page one.</p>
  <button class="back-link" onclick="goTo1()">← back to page 1</button>
</div>


<script>
  function goTo2() {
    document.getElementById('page1').classList.remove('active');
    document.getElementById('page2').classList.add('active');
    document.getElementById('menuList').classList.remove('open');
    document.getElementById('menuTrigger').classList.remove('open');
    window.scrollTo(0,0);
  }
  function goTo1() {
    document.getElementById('page2').classList.remove('active');
    document.getElementById('page1').classList.add('active');
    window.scrollTo(0,0);
  }
  function toggleMenu() {
    document.getElementById('menuList').classList.toggle('open');
    document.getElementById('menuTrigger').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const w = document.querySelector('.menu-wrap');
    if (w && !w.contains(e.target)) {
      document.getElementById('menuList').classList.remove('open');
      document.getElementById('menuTrigger').classList.remove('open');
    }
  });
</script>
</body>
</html>
